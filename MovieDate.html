<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>She Said Yes! ❤️</title>

<style>
body {
    background: rgb(255, 227, 231);
    font-family: Arial, sans-serif;
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

.content {
    background: white;
    width: 100%;
    height: 42vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    position: relative;
    z-index: 2;
    text-align: center;
    transform: translateY(-60%);
}

.movie-emoji {
    font-size: 2.2rem;
    margin-bottom: 15px;
}

.message {
    padding: 0 20px;
    line-height: 1.7;
    color: #444;
}

.message h2 {
    color: #e9557a;
    margin-bottom: 10px;
}

.message p {
    margin: 8px 0;
}

.continue-btn {
    margin-top: 15px;
    padding: 12px 25px;
    border: none;
    border-radius: 999px;
    background: #e9557a;
    color: white;
    font-size: 1rem;
    cursor: pointer;
}

.continue-btn:hover {
    background: #d43b61;
}

.emoji-container {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    pointer-events: none;
}

.emoji {
    position: absolute;
    bottom: 0;
    width: 40px;
    height: 40px;
    pointer-events: none;
}

@keyframes rotate-clockwise {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

@keyframes slide-up {
    from {
        bottom: -50px;
        opacity: 1;
    }
    to {
        bottom: 110vh;
        opacity: 0;
    }
}

#partyPopup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    color: #e9557a;
    font-size: 2rem;
    font-weight: bold;
    padding: 25px 40px;
    border-radius: 20px;
    box-shadow: 0 0 25px rgba(0,0,0,0.25);
    z-index: 9999;
    animation: popup 2s ease forwards;
}

@keyframes popup {
    0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.5);
    }

    20% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.15);
    }

    80% {
        opacity: 1;
    }

    100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1);
        visibility: hidden;
    }
}
</style>
</head>

<body>

<div id="partyPopup">🎉 YAAAYYY!! 🎉</div>

<main class="content">

<div class="movie-emoji">🎬💕🍿</div>

<div class="message">
    <h2>You Said Yes! ❤️</h2>

    <p>Yayyy! You just made my day ✨</p>

    <p>
        I can't wait to spend some wonderful moments with you,
        laugh together, and make beautiful memories 💕
    </p>

    <p>
        Thank you for saying yes. It means more than you know ❤️
    </p>

    <p>
        Now that you've said yes...
        our movie date is officially happening 🍿❤️
    </p>

</div>

</main>

<div class="emoji-container" id="emojiContainer"></div>

<script>

setTimeout(() => {
    const popup = document.getElementById("partyPopup");
    if (popup) popup.remove();
}, 2000);

const emojiContainer = document.getElementById('emojiContainer');

const heartSVG =
'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="40px" height="40px"><path fill="none" stroke="#ff66b2" stroke-width="2" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41 1.01 4.21 2.64A5.006 5.006 0 0 1 16.5 3 5.5 5.5 0 0 1 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>';

function createHeart() {
    const heart = document.createElement('div');
    heart.className = 'emoji';
    heart.innerHTML = heartSVG;

    heart.style.left = `${Math.random() * 90}%`;

    heart.style.animation =
        `rotate-clockwise 3000ms linear infinite,
         slide-up ${5000 + Math.random() * 2000}ms linear`;

    emojiContainer.appendChild(heart);

    heart.addEventListener('animationend', () => {
        heart.remove();
    });
}

function slideHearts() {
    for (let i = 0; i < 10; i++) {
        setTimeout(createHeart, Math.random() * 2000);
    }

    setTimeout(slideHearts, 3500);
}

slideHearts();

document.getElementById("continueBtn").addEventListener("click", () => {
    window.location.href = "surprise.html";
});

</script>

</body>
</html>
