<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Surprise For Her</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      background: rgb(255, 227, 231);
      font-family: Arial, sans-serif;
      padding: 0;
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .content {
      background: white;
      padding: 0.1rem;
      font-size: 1.5rem;
      width: 100%; /* Expand to full width */
      height: 25vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      z-index: 2;
      transform: translateY(-80%);
    }
    .emoji-fixed {
      font-size: 2rem;
      position: absolute;
      top: 0.5rem;
    }
    .message {
      margin-top: 3rem;
      margin-bottom: 1.5rem;
    }
    .popup-buttons,
    .link-container {
      opacity: 0;
      transition: opacity 0.5s ease;
      display: none;
    }
    .popup-buttons.show,
    .link-container.show {
      opacity: 1;
      display: flex;
    }
    .popup-buttons button {
      padding: 0.7rem 1.2rem;
      border: none;
      border-radius: 9999px;
      margin: 0 0.5rem;
      cursor: pointer;
      font-size: 1rem;
      color: white;
    }
    .popup-buttons #yesButton {
      background: #e9557a;
    }
    .popup-buttons #yesButton:hover {
      background: #d43b61;
    }
    .popup-buttons #noButton {
      background: #cb77d3;
    }
    .popup-buttons #noButton:hover {
      background: #ae65b4;
    }
    .link-container a {
      color: #4285f4;
      font-size: 1.2rem;
      text-decoration: none;
    }
    .link-container a:hover {
      text-decoration: underline;
    }
    .emoji-container {
      position: fixed;
      bottom: 0;
      width: 100%;
      height: 70vh;
      z-index: 1;
      pointer-events: none;
    }
    .emoji {
      position: absolute;
      bottom: 0;
      width: 40px;
      height: 40px;
      z-index: 1;
      pointer-events: none;
    }
    @keyframes rotate-clockwise {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes rotate-counterclockwise {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }
    @keyframes slide-up {
      from { bottom: 0; }
      to { bottom: 110vh; }
    }
  </style>
</head>
<body>
  <main class="content">
    <div class="emoji-fixed">🌻</div>
    <div class="message" id="messageBox"></div>
    <div class="popup-buttons" id="btnContainer">
      <button id="yesButton">Yes !</button>
      <button id="noButton">No</button>
    </div>
    <div class="link-container" id="linkContainer">
      <a href="surprise.html"></a>
    </div>
  </main>
  <div class="emoji-container" id="emojiContainer"></div>
  <script>
  const messageBox = document.getElementById('messageBox');
  const btnContainer = document.getElementById('btnContainer');
  const noButton = document.getElementById('noButton');
  const yesButton = document.getElementById('yesButton');

  // Show question immediately
  messageBox.textContent = "Would you like to go on a movie date with me? 💖";
  btnContainer.style.display = 'flex';
  btnContainer.classList.add('show');

  // YES button action
  yesButton.addEventListener('click', () => {
    window.location.href = "nextpage.html";
  });

  // Make NO button impossible to click
  function moveNoButton() {
    const maxX = window.innerWidth - noButton.offsetWidth - 20;
    const maxY = window.innerHeight - noButton.offsetHeight - 20;

    noButton.style.position = 'fixed';
    noButton.style.left = Math.random() * maxX + 'px';
    noButton.style.top = Math.random() * maxY + 'px';
  }

  // Move when mouse gets near
  noButton.addEventListener('mouseover', moveNoButton);

  // Also move on touch devices
  noButton.addEventListener('touchstart', (e) => {
    e.preventDefault();
    moveNoButton();
  });
</script>
</body>
</html>
