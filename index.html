<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Asking Her For Movie Date</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      background: rgb(255, 227, 231);
      font-family: Arial, sans-serif;
      padding: 0;
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .content {
      background: white;
      padding: 0.1rem;
      font-size: 1.5rem;
      width: 100%; /* Expand to full width */
      height: 25vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      z-index: 2;
      transform: translateY(-80%);
    }
    .emoji-fixed {
      font-size: 2rem;
      position: absolute;
      top: 0.5rem;
    }
    .message {
      margin-top: 3rem;
      margin-bottom: 1.5rem;
    }
    .popup-buttons,
    .link-container {
      opacity: 0;
      transition: opacity 0.5s ease;
      display: none;
    }
    .popup-buttons.show,
    .link-container.show {
      opacity: 1;
      display: flex;
    }
    .popup-buttons button {
      padding: 0.7rem 1.2rem;
      border: none;
      border-radius: 9999px;
      margin: 0 0.5rem;
      cursor: pointer;
      font-size: 1rem;
      color: white;
    }
    .popup-buttons #yesButton {
      background: #e9557a;
    }
    .popup-buttons #yesButton:hover {
      background: #d43b61;
    }
    .popup-buttons #noButton {
      background: #cb77d3;
    }
    .popup-buttons #noButton:hover {
      background: #ae65b4;
    }
    .link-container a {
      color: #4285f4;
      font-size: 1.2rem;
      text-decoration: none;
    }
    .link-container a:hover {
      text-decoration: underline;
    }
    .emoji-container {
      position: fixed;
      bottom: 0;
      width: 100%;
      height: 70vh;
      z-index: 1;
      pointer-events: none;
    }
    .emoji {
      position: absolute;
      bottom: 0;
      width: 40px;
      height: 40px;
      z-index: 1;
      pointer-events: none;
    }
    @keyframes rotate-clockwise {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes rotate-counterclockwise {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }
    @keyframes slide-up {
      from { bottom: 0; }
      to { bottom: 110vh; }
    }
  </style>
</head>
<body>
  <main class="content">
    <div class="emoji-fixed">🌻</div>
    <div class="message" id="messageBox"></div>
    <div class="popup-buttons" id="btnContainer">
      <button id="yesButton">Yes !</button>
      <button id="noButton">No</button>
    </div>
    <div class="link-container" id="linkContainer">
      <a href="surprise.html"></a>
    </div>
  </main>
  <div class="emoji-container" id="emojiContainer"></div>
  <script>
  const messageBox = document.getElementById('messageBox');
  const btnContainer = document.getElementById('btnContainer');
  const noButton = document.getElementById('noButton');
  const yesButton = document.getElementById('yesButton');
  const emojiContainer = document.getElementById('emojiContainer');
  const heartSVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="40px" height="40px"><path fill="none" stroke="#ff66b2" stroke-width="2" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41 1.01 4.21 2.64A5.006 5.006 0 0 1 16.5 3 5.5 5.5 0 0 1 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>';
  function createEmoji() {
    const emoji = document.createElement('div');
    emoji.innerHTML = heartSVG;
    emoji.className = 'emoji';

    emoji.style.left = `${Math.random() * 90}%`;

    emoji.style.animation =
      `rotate-clockwise 3000ms linear infinite,
       slide-up ${5000 + Math.random() * 2000}ms linear`;

    emojiContainer.appendChild(emoji);

    emoji.addEventListener('animationend', () => {
      emoji.remove();
    });
  }

  function slideEmojis() {
    for (let i = 0; i < 6; i++) {
      setTimeout(createEmoji, Math.random() * 2000);
    }

    setTimeout(slideEmojis, 4000);
  }

  slideEmojis();

  // Show question immediately
  messageBox.textContent = "Would you like to go on a movie date with me? 💖";
  btnContainer.style.display = 'flex';
  btnContainer.classList.add('show');

  // YES button action
  yesButton.addEventListener('click', () => {
    window.location.href = "nextpage.html";
  });

  // Make NO button impossible to click
  const container = document.querySelector(".content");

  function moveNoButton() {
  const rect = container.getBoundingClientRect();

  ```
  const buttonWidth = noButton.offsetWidth;
  const buttonHeight = noButton.offsetHeight;
  const padding = 15;

  const randomX =
      rect.left +
      padding +
      Math.random() *
      (rect.width - buttonWidth - padding * 2);

  const randomY =
      rect.top +
      padding +
      Math.random() *
      (rect.height - buttonHeight - padding * 2);

  noButton.style.position = "fixed";
  noButton.style.left = randomX + "px";
  noButton.style.top = randomY + "px";
  ```
  }
  // Move when mouse gets near
  noButton.addEventListener('mouseover', moveNoButton);

  // Also move on touch devices
  noButton.addEventListener('touchstart', (e) => {
    e.preventDefault();
    moveNoButton();
  });
</script>
</body>
</html>
